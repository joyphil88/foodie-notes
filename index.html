<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foodie Notes</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: #fafaf8;
      color: #1a1917;
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    header { margin-bottom: 48px; }

    .eyebrow {
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: #888580;
      margin-bottom: 10px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1.1;
    }

    .trip-list { list-style: none; }

    .trip-item a {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      border-bottom: 1px solid #e8e6e1;
      text-decoration: none;
      color: inherit;
      transition: opacity .15s;
    }

    .trip-item:first-child a { border-top: 1px solid #e8e6e1; }
    .trip-item a:hover { opacity: .5; }

    .trip-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .trip-meta {
      font-size: .75rem;
      color: #888580;
      margin-top: 3px;
    }

    .arrow {
      font-size: 1rem;
      color: #888580;
      flex-shrink: 0;
      margin-left: 16px;
    }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="eyebrow">Phil's</div>
    <h1>Foodie Notes</h1>
  </header>

  <ul class="trip-list">
    <li class="trip-item">
      <a href="austin2026.html">
        <div>
          <div class="trip-name">Austin</div>
          <div class="trip-meta">Texas · 2026 · 16 places</div>
        </div>
        <span class="arrow">→</span>
      </a>
    </li>
  </ul>
</div>
</body>
</html>
