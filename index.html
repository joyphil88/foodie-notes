<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Foodie Notes</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e8e6e1;
      --text: #1a1917;
      --muted: #888580;
      --light: #f3f2ee;
    }

    html, body {
      min-height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    .page {
      max-width: 560px;
      margin: 0 auto;
      padding: 64px 24px 80px;
    }

    header { margin-bottom: 48px; }

    .eyebrow {
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
    }

    .header-row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 2.4rem;
      font-weight: 600;
      line-height: 1.1;
    }

    .trip-list { list-style: none; }

    .trip-item {
      position: relative;
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }

    .trip-item:first-child { border-top: 1px solid var(--border); }

    .trip-item a {
      flex: 1;
      min-width: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 20px 0;
      text-decoration: none;
      color: inherit;
      transition: opacity .15s;
    }

    .trip-item a:hover { opacity: .5; }

    .trip-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.25rem;
      font-weight: 600;
    }

    .trip-meta {
      font-size: .75rem;
      color: var(--muted);
      margin-top: 3px;
    }

    .arrow {
      font-size: 1rem;
      color: var(--muted);
      flex-shrink: 0;
      margin-left: 16px;
    }

    .empty-trips {
      padding: 24px 0;
      color: var(--muted);
      font-size: .85rem;
    }

    /* ── Kebabs + dropdown menus ── */
    .page-menu-wrap, .trip-menu-wrap { position: relative; flex-shrink: 0; }
    .trip-menu-wrap { margin-left: 8px; }

    .page-menu-btn, .trip-menu-btn {
      width: 28px;
      height: 28px;
      border: 1px solid var(--border);
      border-radius: 50%;
      background: var(--surface);
      color: var(--muted);
      font-size: .95rem;
      line-height: 1;
      cursor: pointer;
      transition: all .15s;
    }

    .page-menu-btn:hover, .trip-menu-btn:hover { border-color: var(--text); color: var(--text); }

    .page-menu, .trip-menu {
      display: none;
      position: absolute;
      right: 0;
      top: 100%;
      margin-top: 6px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      box-shadow: 0 4px 16px rgba(0,0,0,.15);
      z-index: 20;
      min-width: 150px;
      overflow: hidden;
    }

    .page-menu.open, .trip-menu.open { display: block; }

    .page-menu button, .trip-menu button {
      display: block;
      width: 100%;
      text-align: left;
      padding: 10px 14px;
      font-family: 'Inter', sans-serif;
      font-size: .78rem;
      font-weight: 500;
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
    }

    .page-menu button:hover, .trip-menu button:hover { background: var(--light); }
    .trip-menu button.danger { color: #c0392b; }

    /* ── New/edit trip modal ── */
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(26,25,23,.5);
      z-index: 2000;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .modal-overlay.open { display: flex; }

    .modal {
      background: var(--surface);
      border-radius: 6px;
      width: 100%;
      max-width: 380px;
      max-height: 90vh;
      overflow-y: auto;
      padding: 24px;
      box-shadow: 0 12px 48px rgba(0,0,0,.25);
      position: relative;
    }

    .modal h2 {
      font-family: 'Playfair Display', serif;
      font-size: 1.3rem;
      font-weight: 600;
      padding-right: 20px;
    }

    .modal-close {
      position: absolute;
      top: 18px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.3rem;
      color: var(--muted);
      cursor: pointer;
      line-height: 1;
    }

    .modal label {
      display: block;
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      margin-top: 14px;
      margin-bottom: 5px;
    }

    .modal input {
      width: 100%;
      font-family: 'Inter', sans-serif;
      font-size: .85rem;
      padding: 9px 11px;
      border: 1px solid var(--border);
      border-radius: 4px;
      background: var(--bg);
      color: var(--text);
    }

    .modal-hint { font-size: .68rem; color: var(--muted); margin-top: 5px; }

    .modal-actions {
      display: flex;
      gap: 10px;
      margin-top: 22px;
    }

    .modal-actions button {
      flex: 1;
      padding: 10px;
      font-size: .72rem;
      font-weight: 600;
      letter-spacing: .06em;
      text-transform: uppercase;
      border-radius: 20px;
      cursor: pointer;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text);
    }

    .modal-actions button.primary {
      background: var(--text);
      border-color: var(--text);
      color: #fff;
    }

    .modal-actions button:disabled { opacity: .5; cursor: default; }

    .modal-error {
      font-size: .72rem;
      color: #c0392b;
      margin-top: 10px;
      display: none;
    }

    .modal-error.show { display: block; }

    /* ── Toasts ── */
    #toast-wrap { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); z-index: 3000; display: flex; flex-direction: column; gap: 8px; align-items: center; pointer-events: none; }
    .toast { background: var(--text); color: #fff; font-size: .78rem; font-weight: 500; padding: 10px 16px; border-radius: 8px; box-shadow: 0 4px 16px rgba(0,0,0,.25); opacity: 0; transform: translateY(8px); transition: opacity .2s, transform .2s; max-width: 320px; text-align: center; }
    .toast.show { opacity: 1; transform: translateY(0); }
    .toast.danger { background: #c0392b; }

    /* ── Dialog (prompt / confirm / passcode) ── */
    .dialog-overlay { position: fixed; inset: 0; background: rgba(26,25,23,.45); display: none; align-items: center; justify-content: center; z-index: 2600; padding: 20px; }
    .dialog-overlay.open { display: flex; }
    .dialog { background: var(--surface); border-radius: 12px; padding: 24px; width: 100%; max-width: 360px; box-shadow: 0 12px 48px rgba(0,0,0,.22); }
    .dialog h3 { font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 600; margin-bottom: 6px; }
    .dialog p { font-size: .82rem; color: var(--muted); margin-bottom: 16px; line-height: 1.45; }
    .dialog input { width: 100%; font-family: 'Inter', sans-serif; font-size: .9rem; padding: 10px 12px; border: 1px solid var(--border); border-radius: 6px; background: var(--bg); color: var(--text); margin-bottom: 16px; }
    .dialog-actions { display: flex; gap: 8px; justify-content: flex-end; }
    .dialog-actions button { font-family: 'Inter', sans-serif; font-size: .72rem; font-weight: 600; letter-spacing: .04em; text-transform: uppercase; padding: 9px 16px; border-radius: 20px; cursor: pointer; border: 1px solid var(--border); background: var(--surface); color: var(--text); }
    .dialog-actions button.primary { background: var(--text); border-color: var(--text); color: #fff; }
    .dialog-actions button.danger { background: #c0392b; border-color: #c0392b; color: #fff; }
  </style>
</head>
<body>
<div class="page">
  <header>
    <div class="eyebrow">Phil's</div>
    <div class="header-row">
      <h1>Foodie Notes</h1>
      <div class="page-menu-wrap">
        <button class="page-menu-btn" title="More" onclick="toggleNewTripMenu(event)">⋯</button>
        <div class="page-menu" id="new-trip-menu">
          <button onclick="openTripModal()">+ New foodie note</button>
        </div>
      </div>
    </div>
    <p style="font-size: .85rem; color: var(--muted); margin-top: 8px;">Places to try</p>
  </header>

  <ul class="trip-list" id="custom-trip-list"></ul>
</div>

<div class="modal-overlay" id="trip-modal-overlay">
  <div class="modal">
    <button class="modal-close" type="button" onclick="closeTripModal()">&times;</button>
    <h2 id="trip-modal-title">New foodie note</h2>
    <form id="trip-form">
      <label for="trip-name">Name</label>
      <input type="text" id="trip-name" required placeholder="e.g. Tokyo" />
      <label for="trip-subtitle">Subtitle</label>
      <input type="text" id="trip-subtitle" placeholder="e.g. Japan · 2027" />
      <div id="trip-destination-group">
        <label for="trip-destination">Destination</label>
        <input type="text" id="trip-destination" placeholder="e.g. Tokyo, Japan" />
        <div class="modal-hint">Used to center the map — doesn't need to be exact.</div>
      </div>
      <div class="modal-error" id="trip-error"></div>
      <div class="modal-actions">
        <button type="button" onclick="closeTripModal()">Cancel</button>
        <button type="submit" class="primary" id="trip-submit">Create</button>
      </div>
    </form>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const SUPABASE_URL = 'https://almchnjiepfqqgzvqnkb.supabase.co';
const SUPABASE_KEY = 'sb_publishable_GTmDaMUBXuofMxjo2j9A_w_8oSf77Ft';
const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
const DB_API = '/.netlify/functions/db';
let trips = [];
let openTripMenuSlug = null;
let editingTripSlug = null;

function slugify(s) {
  return s.toLowerCase().replace(/[^a-z0-9]+/g, '-').replace(/(^-|-$)/g, '');
}

async function authedFetch(url, options = {}) {
  const stored = localStorage.getItem('foodiePasscode');
  const headers = { ...(options.headers || {}) };
  if (stored) headers['x-foodie-passcode'] = stored;
  let res = await fetch(url, { ...options, headers });
  if (res.status === 401) {
    const code = await askText('Enter passcode', 'Passcode', { inputType: 'password', confirmText: 'Unlock' });
    if (!code) return res;
    localStorage.setItem('foodiePasscode', code);
    res = await fetch(url, { ...options, headers: { ...headers, 'x-foodie-passcode': code } });
    if (res.status === 401) localStorage.removeItem('foodiePasscode');
  }
  return res;
}

function dbWrite(payload) {
  return authedFetch(DB_API, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(payload),
  });
}

// ── Toast + dialog UI kit ───────────────────────────────────────────
function showToast(msg, kind) {
  let wrap = document.getElementById('toast-wrap');
  if (!wrap) { wrap = document.createElement('div'); wrap.id = 'toast-wrap'; document.body.appendChild(wrap); }
  const el = document.createElement('div');
  el.className = 'toast' + (kind ? ' ' + kind : '');
  el.textContent = msg;
  wrap.appendChild(el);
  requestAnimationFrame(() => el.classList.add('show'));
  setTimeout(() => { el.classList.remove('show'); setTimeout(() => el.remove(), 250); }, 3400);
}

function uiDialog(opts) {
  return new Promise((resolve) => {
    const isInput = !!opts.input;
    const overlay = document.createElement('div');
    overlay.className = 'dialog-overlay open';
    overlay.innerHTML =
      '<div class="dialog">' +
        '<h3></h3>' +
        (opts.message ? '<p></p>' : '') +
        (isInput ? '<input />' : '') +
        '<div class="dialog-actions">' +
          '<button class="cancel"></button>' +
          '<button class="primary"></button>' +
        '</div>' +
      '</div>';
    overlay.querySelector('h3').textContent = opts.title || '';
    if (opts.message) overlay.querySelector('p').textContent = opts.message;
    const inputEl = overlay.querySelector('input');
    if (inputEl) { inputEl.type = opts.inputType || 'text'; inputEl.placeholder = opts.placeholder || ''; inputEl.value = opts.value || ''; }
    const cancelBtn = overlay.querySelector('.cancel');
    const okBtn = overlay.querySelector('.primary');
    cancelBtn.textContent = opts.cancelText || 'Cancel';
    okBtn.textContent = opts.confirmText || 'OK';
    if (opts.danger) okBtn.classList.add('danger');
    document.body.appendChild(overlay);
    if (inputEl) setTimeout(() => inputEl.focus(), 30);
    const done = (val) => { overlay.remove(); resolve(val); };
    cancelBtn.onclick = () => done(isInput ? null : false);
    okBtn.onclick = () => done(isInput ? ((inputEl.value || '').trim() || null) : true);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) done(isInput ? null : false); });
    if (inputEl) inputEl.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); done((inputEl.value || '').trim() || null); }
      if (e.key === 'Escape') done(null);
    });
  });
}

function askText(title, placeholder, opts) {
  return uiDialog(Object.assign({ title, placeholder, input: true, confirmText: 'Save' }, opts || {}));
}
function askConfirm(title, message, opts) {
  return uiDialog(Object.assign({ title, message, confirmText: 'Confirm' }, opts || {}));
}

async function geocode(destination) {
  const url = `https://nominatim.openstreetmap.org/search?format=json&limit=1&q=${encodeURIComponent(destination)}`;
  const res = await fetch(url);
  if (!res.ok) throw new Error('Geocoding request failed');
  const results = await res.json();
  if (!results.length) throw new Error('Destination not found');
  return { lat: parseFloat(results[0].lat), lng: parseFloat(results[0].lon) };
}

const listEl = document.getElementById('custom-trip-list');

function renderTrips() {
  listEl.innerHTML = '';
  const sorted = [...trips].sort((a, b) => (b.created_at || '').localeCompare(a.created_at || ''));
  sorted.forEach(trip => {
    const li = document.createElement('li');
    li.className = 'trip-item';
    li.innerHTML = `
      <a href="trip.html?city=${encodeURIComponent(trip.slug)}">
        <div>
          <div class="trip-name">${trip.name}</div>
          <div class="trip-meta">${trip.subtitle || ''}</div>
        </div>
        <span class="arrow">→</span>
      </a>
      <div class="trip-menu-wrap">
        <button class="trip-menu-btn" title="More" onclick="toggleTripMenu('${trip.slug}', event)">⋯</button>
        <div class="trip-menu${openTripMenuSlug === trip.slug ? ' open' : ''}">
          <button onclick="openTripModal('${trip.slug}', event)">Edit</button>
          <button class="danger" onclick="deleteTrip('${trip.slug}', event)">Delete</button>
        </div>
      </div>`;
    listEl.appendChild(li);
  });
}

function toggleTripMenu(slug, ev) {
  if (ev) ev.stopPropagation();
  openTripMenuSlug = openTripMenuSlug === slug ? null : slug;
  renderTrips();
}

function toggleNewTripMenu(ev) {
  if (ev) ev.stopPropagation();
  document.getElementById('new-trip-menu').classList.toggle('open');
}

document.addEventListener('click', () => {
  if (openTripMenuSlug !== null) { openTripMenuSlug = null; renderTrips(); }
  document.getElementById('new-trip-menu').classList.remove('open');
});

async function deleteTrip(slug, ev) {
  if (ev) ev.stopPropagation();
  const trip = trips.find(t => t.slug === slug);
  if (!trip) return;
  if (!(await askConfirm('Delete list?', `Delete "${trip.name}"? This removes all its places too.`, { danger: true, confirmText: 'Delete' }))) return;
  try {
    const res = await dbWrite({ table: 'trips', op: 'delete', match: { slug } });
    if (!res.ok) throw new Error('delete failed');
  } catch (e) {
    console.error('Failed to delete trip', e);
    showToast('Could not delete this list — check your passcode.', 'danger');
    return;
  }
  trips = trips.filter(t => t.slug !== slug);
  renderTrips();
}

const tripModalOverlay = document.getElementById('trip-modal-overlay');
const tripForm = document.getElementById('trip-form');
const tripModalTitle = document.getElementById('trip-modal-title');
const tripNameInput = document.getElementById('trip-name');
const tripSubtitleInput = document.getElementById('trip-subtitle');
const tripDestinationInput = document.getElementById('trip-destination');
const tripDestinationGroup = document.getElementById('trip-destination-group');
const tripError = document.getElementById('trip-error');
const tripSubmitBtn = document.getElementById('trip-submit');

function openTripModal(slug, ev) {
  if (ev) ev.stopPropagation();
  openTripMenuSlug = null;
  renderTrips();
  tripForm.reset();
  tripError.classList.remove('show');
  if (slug) {
    const trip = trips.find(t => t.slug === slug);
    if (!trip) return;
    editingTripSlug = slug;
    tripNameInput.value = trip.name;
    tripSubtitleInput.value = trip.subtitle || '';
    tripDestinationGroup.style.display = 'none';
    tripModalTitle.textContent = 'Edit foodie note';
    tripSubmitBtn.textContent = 'Save changes';
  } else {
    editingTripSlug = null;
    tripDestinationGroup.style.display = '';
    tripModalTitle.textContent = 'New foodie note';
    tripSubmitBtn.textContent = 'Create';
  }
  tripModalOverlay.classList.add('open');
}

function closeTripModal() {
  tripModalOverlay.classList.remove('open');
}

tripModalOverlay.addEventListener('click', (e) => {
  if (e.target === tripModalOverlay) closeTripModal();
});

tripForm.addEventListener('submit', async (e) => {
  e.preventDefault();
  tripError.classList.remove('show');
  const name = tripNameInput.value.trim();
  const subtitle = tripSubtitleInput.value.trim();
  if (!name) return;

  if (editingTripSlug) {
    tripSubmitBtn.disabled = true;
    tripSubmitBtn.textContent = 'Saving…';
    try {
      const res = await dbWrite({ table: 'trips', op: 'update', match: { slug: editingTripSlug }, values: { name, subtitle } });
      if (res.status === 401) throw new Error('unauthorized');
      if (!res.ok) throw new Error('save failed');
      const trip = trips.find(t => t.slug === editingTripSlug);
      if (trip) { trip.name = name; trip.subtitle = subtitle; }
      renderTrips();
      closeTripModal();
    } catch (err) {
      tripError.textContent = err.message === 'unauthorized'
        ? 'Wrong passcode — try again.'
        : 'Something went wrong saving — try again.';
      tripError.classList.add('show');
    } finally {
      tripSubmitBtn.disabled = false;
      tripSubmitBtn.textContent = 'Save changes';
    }
    return;
  }

  const destination = tripDestinationInput.value.trim();
  if (!destination) return;

  tripSubmitBtn.disabled = true;
  tripSubmitBtn.textContent = 'Locating…';
  let coords;
  try {
    coords = await geocode(destination);
  } catch (err) {
    tripError.textContent = "Couldn't find that destination — try adding more detail.";
    tripError.classList.add('show');
    tripSubmitBtn.disabled = false;
    tripSubmitBtn.textContent = 'Create';
    return;
  }

  tripSubmitBtn.textContent = 'Creating…';
  let slug = slugify(name);
  let n = 2;
  while (trips.some(t => t.slug === slug)) { slug = `${slugify(name)}-${n++}`; }
  try {
    const res = await dbWrite({ table: 'trips', op: 'insert', values: { slug, name, subtitle, lat: coords.lat, lng: coords.lng, zoom: 12 } });
    if (res.status === 401) throw new Error('unauthorized');
    if (!res.ok) throw new Error('create failed');
    const trip = await res.json();
    // Every list gets a default Hotel category — hidden from the filter pills,
    // so it never clutters, but keeps new lists consistent with the built-in ones.
    try {
      await dbWrite({ table: 'categories', op: 'insert', values: { trip_slug: trip.slug, key: 'Hotel', label: 'Hotel', color: '#1a1917' } });
    } catch (e) { /* non-fatal — enrich.js also tolerates a category-less trip */ }
    window.location.href = `trip.html?city=${encodeURIComponent(trip.slug)}`;
  } catch (err) {
    tripError.textContent = err.message === 'unauthorized'
      ? 'Wrong passcode — try again.'
      : 'Something went wrong creating this trip — try again.';
    tripError.classList.add('show');
    tripSubmitBtn.disabled = false;
    tripSubmitBtn.textContent = 'Create';
  }
});

async function init() {
  try {
    const { data, error } = await sb.from('trips').select('*');
    if (error) throw error;
    trips = data || [];
  } catch (e) {
    console.error('Failed to load trips', e);
  }
  renderTrips();
}
init();
</script>
</body>
</html>
