<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hawaii 2026</title>
  <link rel="apple-touch-icon" href="apple-touch-icon.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e8e6e1;
      --text: #1a1917;
      --muted: #888580;
      --light: #f3f2ee;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Desktop layout ── */
    #app { display: flex; height: 100vh; }

    #sidebar {
      width: 360px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── Header ── */
    .sidebar-header {
      padding: 28px 24px 18px;
      border-bottom: 1px solid var(--border);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 14px;
      transition: color .15s;
    }

    .back-link:hover { color: var(--text); }

    .sidebar-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 600;
      line-height: 1.1;
    }

    .sidebar-header h1 span {
      display: block;
      font-size: .92rem;
      font-weight: 400;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      margin-top: 4px;
    }

    #count-label { font-size: .7rem; color: var(--muted); margin-top: 9px; }

    /* ── Filters ── */
    #filters {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--light);
    }

    .chip {
      font-size: .6rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
      background: var(--surface);
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .chip:hover { border-color: var(--text); color: var(--text); }
    .chip.active { background: var(--text); border-color: var(--text); color: #fff; }

    /* ── List ── */
    #place-list { flex: 1; overflow-y: auto; padding: 4px 0; }

    #place-list::-webkit-scrollbar { width: 4px; }
    #place-list::-webkit-scrollbar-track { background: transparent; }
    #place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .place-item {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      padding: 13px 24px;
      cursor: pointer;
      transition: background .1s;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .place-item:last-child { border-bottom: none; }
    .place-item:hover { background: var(--light); }
    .place-item.selected { background: var(--light); }

    .place-item.selected::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--text);
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

    .place-name { font-size: .88rem; font-weight: 500; line-height: 1.3; }
    .place-note { font-size: .72rem; color: var(--muted); margin-top: 2px; line-height: 1.4; font-style: italic; }
    .place-meta { font-size: .68rem; color: var(--muted); margin-top: 3px; }

    .place-maps {
      font-size: .68rem;
      color: var(--muted);
      text-decoration: none;
      margin-top: 3px;
      display: inline-flex;
      align-items: center;
      gap: 2px;
      transition: color .15s;
    }

    .place-maps:hover { color: var(--text); }


    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: #fff !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.1) !important;
      color: var(--text) !important;
      padding: 0 !important;
    }

    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: var(--muted) !important;
      top: 10px !important;
      right: 10px !important;
      font-size: 16px !important;
    }

    .popup-body { padding: 20px; min-width: 220px; max-width: 270px; }

    .popup-cat {
      font-size: .58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .popup-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .popup-note {
      font-size: .78rem;
      color: var(--text);
      font-style: italic;
      margin-bottom: 8px;
      line-height: 1.45;
    }

    .popup-addr { font-size: .72rem; color: var(--muted); margin-bottom: 14px; }

    .popup-link {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--text);
      padding-bottom: 1px;
      text-transform: uppercase;
      transition: opacity .15s;
    }

    .popup-link:hover { opacity: .5; }

    /* ── Mobile: toggle between list and map ── */
    #mobile-toggle {
      display: none;
    }

    @media (max-width: 680px) {
      #app { flex-direction: column; height: 100dvh; }

      #sidebar {
        width: 100%;
        flex: 1;
        border-right: none;
        border-bottom: none;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #map-wrap {
        display: none;
        height: 100dvh;
        flex: none;
        position: fixed;
        inset: 0;
        z-index: 10;
      }

      #map-wrap.visible { display: block; }

      #map-filter-drawer {
        display: none;
        position: fixed;
        top: 0; left: 0; right: 0;
        z-index: 999;
        flex-direction: column;
        align-items: center;
        pointer-events: none;
      }

      #map-filter-drawer.visible { display: flex; }
      #map-filter-handle, #map-filter-chips { pointer-events: auto; }

      #map-filter-handle {
        margin-top: 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 20px;
        padding: 7px 16px;
        font-family: 'Inter', sans-serif;
        font-size: .65rem;
        font-weight: 600;
        letter-spacing: .08em;
        text-transform: uppercase;
        color: var(--muted);
        cursor: pointer;
        box-shadow: 0 2px 8px rgba(0,0,0,.12);
        display: flex;
        align-items: center;
        gap: 6px;
      }

      #map-filter-chips {
        display: none;
        flex-wrap: wrap;
        justify-content: center;
        gap: 5px;
        padding: 8px 16px 10px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: 12px;
        margin-top: 6px;
        box-shadow: 0 4px 16px rgba(0,0,0,.12);
      }

      #map-filter-chips.open { display: flex; }

      #mobile-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: var(--text);
        color: #fff;
        border: none;
        border-radius: 24px;
        padding: 11px 22px;
        font-family: 'Inter', sans-serif;
        font-size: .75rem;
        font-weight: 600;
        letter-spacing: .06em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(0,0,0,.25);
      }

      .sidebar-header { padding: 18px 18px 12px; }
      .sidebar-header h1 { font-size: 1.5rem; }
      .back-link { font-size: .75rem; }
      #count-label { font-size: .8rem; }
      .chip { font-size: .72rem; padding: 6px 12px; }
      .place-name { font-size: 1rem; }
      .place-note { font-size: .82rem; }
      .place-meta { font-size: .78rem; }
      .place-item { padding: 15px 18px; }
    }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <a class="back-link" href="index.html">← Foodie Notes</a>
      <h1>Hawaii 2026<span>Oahu</span></h1>
      <div id="count-label">Loading…</div>
    </div>
    <div id="filters"></div>
    <div id="place-list"></div>
  </aside>
  <div id="map-wrap">
    <div id="map"></div>
  </div>
</div>

<div id="map-filter-drawer">
  <div id="map-filter-handle" onclick="toggleMapFilters()">
    <span id="map-filter-label">Filter</span>
    <span id="map-filter-arrow">▾</span>
  </div>
  <div id="map-filter-chips"></div>
</div>

<button id="mobile-toggle" onclick="toggleMobileView()">
  <span id="toggle-icon">🗺</span>
  <span id="toggle-label">Map</span>
</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CATEGORIES = {
  Seafood:  { color: '#16a085', label: 'Seafood' },
  Poke:     { color: '#e67e22', label: 'Poke' },
  Bakery:   { color: '#8e5e3d', label: 'Bakery' },
  Local:    { color: '#2980b9', label: 'Local' },
  Dessert:  { color: '#c0696e', label: 'Dessert' },
  Korean:   { color: '#c0392b', label: 'Korean' },
  Activity: { color: '#27ae60', label: 'Activity' },
};

const PLACES = [
  // Honolulu / Aiea
  { name: 'Da Seafood Cartel',      cat: 'Seafood',  addr: 'Honolulu, HI',                      lat: 21.3135, lng: -157.8557, note: 'Fresh poke bowls and seafood plates — a local favorite for quality fish.' },
  { name: 'Asahi Grill',            cat: 'Local',    addr: '633 Dillingham Blvd, Honolulu',      lat: 21.3244, lng: -157.8706, note: 'No-frills island diner — loco moco and plate lunches done right, open late.' },
  // North Shore — Haleiwa & Waialua
  { name: 'Haleiwa No. 7',          cat: 'Seafood',  addr: 'Haleiwa, HI',                        lat: 21.5926, lng: -158.1053, note: 'North Shore seafood spot with fresh catches and a laid-back beach-town vibe.' },
  { name: 'Morning Catch',          cat: 'Seafood',  addr: 'Haleiwa, HI',                        lat: 21.5935, lng: -158.1062, note: 'Casual breakfast and lunch with fresh-caught fish — arrive early, it goes fast.' },
  { name: "Kono's",                 cat: 'Local',    addr: '66-250 Kamehameha Hwy, Haleiwa',     lat: 21.5953, lng: -158.1095, note: 'Legendary breakfast burritos stuffed with kalua pork or shrimp — the North Shore staple.' },
  { name: 'Down to Earth',          cat: 'Local',    addr: '66-197 Kamehameha Hwy, Haleiwa',     lat: 21.5941, lng: -158.1082, note: 'Organic market and hot bar — great pit stop for healthy bites and local produce.' },
  { name: 'Makua Banana Bread',     cat: 'Bakery',   addr: 'Farrington Hwy, North Shore',        lat: 21.6370, lng: -158.0620, note: 'Roadside banana bread stand — warm loaves fresh out of the oven, cash only.' },
  { name: 'Paalaa Kai Bakery',      cat: 'Bakery',   addr: '67-106 Kealohanui St, Waialua',      lat: 21.5728, lng: -158.1311, note: 'Old-school bakery famous for puffies — pillowy fried malasada-style donuts.' },
  { name: 'Poke for the People',    cat: 'Poke',     addr: 'Haleiwa, HI',                        lat: 21.5922, lng: -158.1045, note: 'No-frills poke counter with fresh fish and creative toppings — big portions.' },
  { name: "Haleiwa Joe's",          cat: 'Seafood',  addr: '66-011 Kamehameha Hwy, Haleiwa',     lat: 21.5943, lng: -158.1057, note: 'Waterfront seafood and steak spot right on the harbor — go for sunset and the fresh catch.' },
  // Kahuku & Sunset Beach
  { name: 'Kahuku Superette',       cat: 'Poke',     addr: '56-505 Kamehameha Hwy, Kahuku',      lat: 21.6791, lng: -157.9514, note: 'Unassuming local market with some of the best poke on the island — get the shoyu ahi.' },
  { name: "Ted's Bakery",           cat: 'Bakery',   addr: '59-024 Kamehameha Hwy, Sunset Beach', lat: 21.6647, lng: -158.0486, note: 'North Shore institution — chocolate haupia cream pie and plate lunches.' },
  { name: 'Da Bald Guy',            cat: 'Seafood',  addr: 'Kahuku, HI',                         lat: 21.6783, lng: -157.9560, note: 'Food truck serving Kahuku shrimp in garlic butter or spicy — a North Shore rite.' },
  { name: 'Famous Kahuku Shrimp Truck', cat: 'Seafood', addr: '56-580 Kamehameha Hwy, Kahuku',  lat: 21.6772, lng: -157.9491, note: 'The original Kahuku shrimp truck — classic garlic butter shrimp plate, always a line.' },
  { name: "Romy's Kahuku Prawns & Shrimp", cat: 'Seafood', addr: '56-781 Kamehameha Hwy, Kahuku', lat: 21.6798, lng: -157.9500, note: 'Shrimp hut with prawns raised on-site — try the lemon butter or hot & spicy.' },
  { name: "Ry's Poke Shack",        cat: 'Poke',     addr: 'Kahuku, HI',                         lat: 21.6788, lng: -157.9518, note: 'Small-batch poke shack with a rotating menu of fresh, inventive flavors.' },
  { name: 'Seven Brothers',         cat: 'Local',    addr: '56-565 Kamehameha Hwy, Kahuku',      lat: 21.6768, lng: -157.9483, note: 'Local burger joint in an old sugar mill building — known for their smash burgers.' },
  { name: 'Kahuku Farms',           cat: 'Local',    addr: '56-800 Kamehameha Hwy, Kahuku',       lat: 21.6803, lng: -157.9536, note: 'Working farm with a café — try the açaí bowl topped with their own tropical fruits.' },
  { name: 'Badabingsu',             cat: 'Dessert',  addr: 'Kahuku, HI',                         lat: 21.6810, lng: -157.9527, note: 'Korean bingsu shaved ice in creative flavors — the perfect North Shore cool-down.' },
  { name: 'Kalbi on Fire',          cat: 'Korean',   addr: 'Kahuku, HI',                         lat: 21.6795, lng: -157.9545, note: 'Food truck with Korean BBQ kalbi and loco moco mashups — bold flavors, big plates.' },
  // Activity
  { name: 'Gunstock Ranch',         cat: 'Activity', addr: '56-250 Kamehameha Hwy, Laie',        lat: 21.6484, lng: -157.9118, note: 'Working cattle ranch in the Ko\'olau foothills — horseback rides and mountain views.' },
  { name: 'Three Tables Beach',     cat: 'Activity', addr: '59-337 Kamehameha Hwy, Haleiwa',     lat: 21.6388, lng: -158.0578, note: 'Calm-water snorkeling spot named for its flat reef tables — great for beginners in summer months.' },
];

const HOTELS = [
  { name: 'Aulani',             label: 'Aulani',      addr: '92-1185 Aliʻinui Dr, Ko Olina', lat: 21.3366, lng: -158.1237 },
  { name: 'Ritz-Carlton Turtle Bay', label: 'Turtle Bay', addr: '57-091 Kamehameha Hwy, Kahuku', lat: 21.6972, lng: -157.9970 },
];

// ── Map ──────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([21.630, -158.020], 12);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 19
}).addTo(map);

function makeIcon(color, selected) {
  const base = selected ? 26 : 20;
  const pinColor = selected ? '#1a1917' : '#c8a96e';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="${base}" height="${base * 1.5}">
    <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 24 12 24s12-15 12-24C24 5.373 18.627 0 12 0z" fill="${pinColor}"/>
    <circle cx="12" cy="12" r="4.5" fill="rgba(255,255,255,.9)"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [base, base * 1.5],
    iconAnchor: [base / 2, base * 1.5],
    popupAnchor: [0, -(base * 1.5)]
  });
}

function mapsLink(name, addr) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' ' + addr)}`;
}

// ── Hotel markers ─────────────────────────────────────────────────────
function makeHotelIcon() {
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="20" height="30">
    <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 24 12 24s12-15 12-24C24 5.373 18.627 0 12 0z" fill="#e74c3c"/>
    <circle cx="12" cy="12" r="4.5" fill="rgba(255,255,255,.9)"/>
  </svg>`;
  return L.divIcon({ html: svg, className: '', iconSize: [20, 30], iconAnchor: [10, 30], popupAnchor: [0, -30] });
}

HOTELS.forEach(h => {
  L.marker([h.lat, h.lng], { icon: makeHotelIcon(), zIndexOffset: 1000 })
    .addTo(map)
    .bindPopup(`<div class="popup-body">
      <div class="popup-cat">Your Hotel</div>
      <div class="popup-name">${h.name}</div>
      <div class="popup-addr">${h.addr}</div>
      <a class="popup-link" href="${mapsLink(h.name, h.addr)}" target="_blank" rel="noopener">Open in Maps →</a>
    </div>`, { maxWidth: 290 });
});

let activeFilter = 'All';
let selectedIdx = null;
const markers = [];

PLACES.forEach((p, i) => {
  const marker = L.marker([p.lat, p.lng], { icon: makeIcon(CATEGORIES[p.cat].color, false) })
    .addTo(map)
    .bindPopup(() => `<div class="popup-body">
      <div class="popup-cat">${CATEGORIES[p.cat].label}</div>
      <div class="popup-name">${p.name}</div>
      <div class="popup-note">${p.note}</div>
      <a class="popup-link" href="${mapsLink(p.name, p.addr)}" target="_blank" rel="noopener">${p.addr} →</a>
    </div>`, { maxWidth: 290 });
  marker.on('click', () => { selectPlace(i, false); });
  marker.on('popupclose', () => {
    if (selectedIdx === i) {
      markers[i].setIcon(makeIcon(CATEGORIES[PLACES[i].cat].color, false));
      selectedIdx = null;
      buildList();
    }
  });
  markers.push(marker);
});

// ── Filters ──────────────────────────────────────────────────────────
const filtersEl = document.getElementById('filters');
const listEl = document.getElementById('place-list');
const countEl = document.getElementById('count-label');

function buildFilters() {
  filtersEl.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (activeFilter === 'All' ? ' active' : '');
  all.textContent = 'All';
  all.onclick = () => setFilter('All');
  filtersEl.appendChild(all);

  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeFilter === key ? ' active' : '');
    chip.textContent = cat.label;
    chip.onclick = () => setFilter(activeFilter === key ? 'All' : key);
    filtersEl.appendChild(chip);
  });
}

function setFilter(key) {
  activeFilter = key;
  selectedIdx = null;
  buildFilters();
  buildList();
  updateMarkers();
}

function buildList() {
  listEl.innerHTML = '';
  const visible = PLACES.filter(p => activeFilter === 'All' || p.cat === activeFilter);
  countEl.textContent = activeFilter === 'All'
    ? `${PLACES.length} places to try`
    : `${visible.length} of ${PLACES.length} places`;

  visible.forEach(p => {
    const i = PLACES.indexOf(p);
    const cat = CATEGORIES[p.cat];
    const item = document.createElement('div');
    item.className = 'place-item' + (selectedIdx === i ? ' selected' : '');
    item.dataset.idx = i;
    item.innerHTML = `
      <div>
        <div class="place-name">${p.name}</div>
        <div class="place-note">${p.note}</div>
        <div class="place-meta">${cat.label} &nbsp;·&nbsp; <a class="place-maps" href="${mapsLink(p.name, p.addr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">${p.addr} →</a></div>
      </div>`;
    item.onclick = () => selectPlace(i, true);
    listEl.appendChild(item);
  });
}

function selectPlace(i, pan) {
  if (selectedIdx !== null) {
    markers[selectedIdx].setIcon(makeIcon(CATEGORIES[PLACES[selectedIdx].cat].color, false));
  }
  selectedIdx = i;
  markers[i].setIcon(makeIcon(CATEGORIES[PLACES[i].cat].color, true));
  buildList();
  const el = listEl.querySelector(`[data-idx="${i}"]`);
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  if (pan) {
    map.setView([PLACES[i].lat, PLACES[i].lng], Math.max(map.getZoom(), 15), { animate: true });
  }
  markers[i].openPopup();
}

function updateMarkers() {
  PLACES.forEach((p, i) => {
    const show = activeFilter === 'All' || p.cat === activeFilter;
    if (show && !map.hasLayer(markers[i])) markers[i].addTo(map);
    if (!show && map.hasLayer(markers[i])) markers[i].remove();
  });
}

// ── Mobile map toggle ─────────────────────────────────────────────────
let mapVisible = false;

function toggleMobileView() {
  mapVisible = !mapVisible;
  const mapWrap = document.getElementById('map-wrap');
  const label = document.getElementById('toggle-label');
  const icon = document.getElementById('toggle-icon');
  mapWrap.classList.toggle('visible', mapVisible);
  document.getElementById('map-filter-drawer').classList.toggle('visible', mapVisible);
  label.textContent = mapVisible ? 'List' : 'Map';
  icon.textContent = mapVisible ? '☰' : '🗺';
  if (mapVisible) setTimeout(() => {
    map.invalidateSize();
    if (selectedIdx !== null) {
      map.setView([PLACES[selectedIdx].lat, PLACES[selectedIdx].lng], Math.max(map.getZoom(), 15));
      markers[selectedIdx].openPopup();
    }
  }, 50);
}

function buildMapFilterChips() {
  const el = document.getElementById('map-filter-chips');
  el.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (activeFilter === 'All' ? ' active' : '');
  all.textContent = 'All';
  all.onclick = () => { setFilter('All'); updateMapFilterHandle(); };
  el.appendChild(all);
  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeFilter === key ? ' active' : '');
    chip.textContent = cat.label;
    chip.onclick = () => { setFilter(activeFilter === key ? 'All' : key); updateMapFilterHandle(); };
    el.appendChild(chip);
  });
}

function updateMapFilterHandle() {
  const label = document.getElementById('map-filter-label');
  label.textContent = activeFilter === 'All' ? 'Filter' : CATEGORIES[activeFilter].label;
  buildMapFilterChips();
}

let mapFiltersOpen = false;
function toggleMapFilters() {
  mapFiltersOpen = !mapFiltersOpen;
  document.getElementById('map-filter-chips').classList.toggle('open', mapFiltersOpen);
  document.getElementById('map-filter-arrow').textContent = mapFiltersOpen ? '▴' : '▾';
}

buildFilters();
buildList();
buildMapFilterChips();
</script>
</body>
</html>
