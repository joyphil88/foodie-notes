<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Austin 2026</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #fafaf8;
      --surface: #ffffff;
      --border: #e8e6e1;
      --text: #1a1917;
      --muted: #888580;
      --light: #f3f2ee;
    }

    html, body {
      height: 100%;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Desktop layout ── */
    #app { display: flex; height: 100vh; }

    #sidebar {
      width: 360px;
      min-width: 300px;
      display: flex;
      flex-direction: column;
      background: var(--surface);
      border-right: 1px solid var(--border);
      overflow: hidden;
    }

    #map-wrap { flex: 1; position: relative; }
    #map { width: 100%; height: 100%; }

    /* ── Header ── */
    .sidebar-header {
      padding: 28px 24px 18px;
      border-bottom: 1px solid var(--border);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .08em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 14px;
      transition: color .15s;
    }

    .back-link:hover { color: var(--text); }

    .trip-label {
      font-size: .62rem;
      font-weight: 600;
      letter-spacing: .16em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 7px;
    }

    .sidebar-header h1 {
      font-family: 'Playfair Display', serif;
      font-size: 1.8rem;
      font-weight: 600;
      line-height: 1.1;
    }

    .sidebar-header h1 span {
      display: block;
      font-size: .92rem;
      font-weight: 400;
      color: var(--muted);
      font-family: 'Inter', sans-serif;
      margin-top: 4px;
    }

    #count-label { font-size: .7rem; color: var(--muted); margin-top: 9px; }

    /* ── Filters ── */
    #filters {
      display: flex;
      flex-wrap: wrap;
      gap: 5px;
      padding: 11px 18px;
      border-bottom: 1px solid var(--border);
      background: var(--light);
    }

    .chip {
      font-size: .6rem;
      font-weight: 600;
      padding: 4px 10px;
      border-radius: 20px;
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all .15s;
      user-select: none;
      background: var(--surface);
      color: var(--muted);
      letter-spacing: .06em;
      text-transform: uppercase;
    }

    .chip:hover { border-color: var(--text); color: var(--text); }
    .chip.active { background: var(--text); border-color: var(--text); color: #fff; }

    /* ── List ── */
    #place-list { flex: 1; overflow-y: auto; padding: 4px 0; }

    #place-list::-webkit-scrollbar { width: 4px; }
    #place-list::-webkit-scrollbar-track { background: transparent; }
    #place-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .place-item {
      display: flex;
      align-items: flex-start;
      gap: 13px;
      padding: 13px 24px;
      cursor: pointer;
      transition: background .1s;
      border-bottom: 1px solid var(--border);
      position: relative;
    }

    .place-item:last-child { border-bottom: none; }
    .place-item:hover { background: var(--light); }
    .place-item.selected { background: var(--light); }

    .place-item.selected::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 2px;
      background: var(--text);
    }

    .dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; margin-top: 5px; }

    .place-name { font-size: .88rem; font-weight: 500; line-height: 1.3; }
    .place-note { font-size: .72rem; color: var(--muted); margin-top: 2px; line-height: 1.4; font-style: italic; }
    .place-meta { font-size: .68rem; color: var(--muted); margin-top: 3px; }

    .place-maps {
      font-size: .65rem;
      font-weight: 600;
      letter-spacing: .05em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      padding-bottom: 1px;
      margin-top: 6px;
      display: inline-block;
      transition: color .15s;
    }

    .place-maps:hover { color: var(--text); border-color: var(--text); }

    /* ── Popup ── */
    .leaflet-popup-content-wrapper {
      background: #fff !important;
      border: 1px solid var(--border) !important;
      border-radius: 3px !important;
      box-shadow: 0 8px 32px rgba(0,0,0,.1) !important;
      color: var(--text) !important;
      padding: 0 !important;
    }

    .leaflet-popup-content { margin: 0 !important; }
    .leaflet-popup-tip-container { display: none; }
    .leaflet-popup-close-button {
      color: var(--muted) !important;
      top: 10px !important;
      right: 10px !important;
      font-size: 16px !important;
    }

    .popup-body { padding: 20px; min-width: 220px; max-width: 270px; }

    .popup-cat {
      font-size: .58rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: .12em;
      color: var(--muted);
      margin-bottom: 5px;
    }

    .popup-name {
      font-family: 'Playfair Display', serif;
      font-size: 1.1rem;
      font-weight: 600;
      line-height: 1.2;
      margin-bottom: 5px;
    }

    .popup-note {
      font-size: .78rem;
      color: var(--text);
      font-style: italic;
      margin-bottom: 8px;
      line-height: 1.45;
    }

    .popup-addr { font-size: .72rem; color: var(--muted); margin-bottom: 14px; }

    .popup-link {
      font-size: .68rem;
      font-weight: 600;
      letter-spacing: .06em;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--text);
      padding-bottom: 1px;
      text-transform: uppercase;
      transition: opacity .15s;
    }

    .popup-link:hover { opacity: .5; }

    /* ── Mobile: toggle between list and map ── */
    #mobile-toggle {
      display: none;
    }

    @media (max-width: 680px) {
      #app { flex-direction: column; height: 100dvh; }

      #sidebar {
        width: 100%;
        flex: 1;
        border-right: none;
        border-bottom: none;
        overflow: hidden;
        display: flex;
        flex-direction: column;
      }

      #map-wrap {
        display: none;
        height: 100dvh;
        flex: none;
        position: fixed;
        inset: 0;
        z-index: 10;
      }

      #map-wrap.visible { display: block; }

      #mobile-toggle {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        position: fixed;
        bottom: 22px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 999;
        background: var(--text);
        color: #fff;
        border: none;
        border-radius: 24px;
        padding: 11px 22px;
        font-family: 'Inter', sans-serif;
        font-size: .75rem;
        font-weight: 600;
        letter-spacing: .06em;
        text-transform: uppercase;
        cursor: pointer;
        box-shadow: 0 4px 16px rgba(0,0,0,.25);
      }

      .sidebar-header { padding: 18px 18px 12px; }
      .sidebar-header h1 { font-size: 1.5rem; }
      .back-link { font-size: .75rem; }
      #count-label { font-size: .8rem; }
      .chip { font-size: .72rem; padding: 6px 12px; }
      .place-name { font-size: 1rem; }
      .place-note { font-size: .82rem; }
      .place-meta { font-size: .78rem; }
      .place-item { padding: 15px 18px; }
    }
  </style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <div class="sidebar-header">
      <a class="back-link" href="index.html">← Foodie Notes</a>
      <h1>Austin<span>Texas · 2026</span></h1>
      <div id="count-label">Loading…</div>
    </div>
    <div id="filters"></div>
    <div id="place-list"></div>
  </aside>
  <div id="map-wrap">
    <div id="map"></div>
  </div>
</div>

<button id="mobile-toggle" onclick="toggleMobileView()">
  <span id="toggle-icon">🗺</span>
  <span id="toggle-label">Map</span>
</button>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>
const CATEGORIES = {
  BBQ:       { color: '#c0392b', label: 'BBQ' },
  Japanese:  { color: '#2980b9', label: 'Japanese' },
  Seafood:   { color: '#16a085', label: 'Seafood' },
  Brunch:    { color: '#c0960c', label: 'Brunch' },
  Burgers:   { color: '#8e44ad', label: 'Burgers' },
  Caribbean: { color: '#27ae60', label: 'Caribbean' },
  TexMex:    { color: '#e67e22', label: 'Tex-Mex' },
  Bakery:    { color: '#7f8c8d', label: 'Bakery / Coffee' },
  Bars:      { color: '#2c3e50', label: 'Bars' },
};

const HOTEL = {
  name: 'Thompson Austin',
  addr: '506 San Jacinto Blvd',
  lat: 30.2659,
  lng: -97.7404,
};

const PLACES = [
  { name: 'Parish BBQ',                cat: 'BBQ',       addr: '3220 Manor Rd',          lat: 30.2710, lng: -97.7043, note: 'East Austin stalwart — brisket sandwich and the smoked jalapeño sausage.' },
  { name: 'Mum Foods',                 cat: 'BBQ',       addr: '5811 Manor Rd',          lat: 30.2917, lng: -97.6826, note: 'Nigerian-spiced BBQ — suya-rubbed ribs are unlike anywhere else in Austin.' },
  { name: 'Fiasco BBQ',                cat: 'BBQ',       addr: '641 Allen St',           lat: 30.2608, lng: -97.7317, note: 'No-frills neighborhood smoke spot — brisket by the pound, cash only.' },
  { name: 'Space Kat BBQ',             cat: 'BBQ',       addr: '2431 Webberville Rd',    lat: 30.2629, lng: -97.7033, note: 'Funky East Side newcomer — creative cuts and links with big smoke flavor.' },
  { name: 'Konbini',                   cat: 'Japanese',  addr: '908 E 5th St',           lat: 30.2590, lng: -97.7338, note: 'Japanese convenience store vibes — onigiri, katsu sando, and natural wine.' },
  { name: 'Kome',                      cat: 'Japanese',  addr: '4917 Airport Blvd',      lat: 30.3052, lng: -97.7147, note: 'Beloved neighborhood sushi and izakaya — order the omakase nigiri.' },
  { name: "Clark's Oyster Bar",        cat: 'Seafood',   addr: '1200 W 6th St',          lat: 30.2735, lng: -97.7573, note: "Austin's classic raw bar — Gulf oysters and the lobster roll." },
  { name: 'Paperboy',                  cat: 'Brunch',    addr: '1203 E 11th St',         lat: 30.2702, lng: -97.7269, note: 'East Austin breakfast institution — grain bowls and the egg sandwich.' },
  { name: "Joann's Fine Foods",        cat: 'Brunch',    addr: '1224 S Congress Ave',    lat: 30.2486, lng: -97.7508, note: 'Retro-cool all-day diner on SoCo — short rib hash is the order.' },
  { name: 'Bird Bird Biscuit',         cat: 'Brunch',    addr: '2701 Manor Rd',          lat: 30.2729, lng: -97.7071, note: 'Massive fried chicken biscuits — get the Dolly Parton, no question.' },
  { name: "Birdie's",                  cat: 'Brunch',    addr: '2944 E 12th St',         lat: 30.2683, lng: -97.7007, note: "One of Austin's hottest tables — natural wine and Italian-leaning bites." },
  { name: 'NADC Burger',               cat: 'Burgers',   addr: '1007 E 6th St',          lat: 30.2612, lng: -97.7311, note: 'No-frills smash burgers on East 6th — double with American cheese.' },
  { name: 'Canje',                     cat: 'Caribbean', addr: '1914 E 6th St',          lat: 30.2590, lng: -97.7197, note: "Caribbean cooking by ATX's Brunch Queen — jerk chicken and doubles." },
  { name: 'Taco Joint',                cat: 'TexMex',    addr: '134 E Riverside Dr',     lat: 30.2501, lng: -97.7462, note: 'South Austin Tex-Mex staple — breakfast tacos all day long.' },
  { name: 'Rockman Coffee + Bakeshop', cat: 'Bakery',    addr: '2400 E Cesar Chavez St', lat: 30.2590, lng: -97.7111, note: 'East Side gem — sourdough croissants and serious single origin espresso.' },
  { name: 'Equipment Room',            cat: 'Bars',      addr: '1101 Music Ln',          lat: 30.2487, lng: -97.7577, note: 'Sleek hotel bar on Music Lane — strong cocktails and a great outdoor patio.' },
  { name: 'Small Victory',             cat: 'Bars',      addr: '108 E 7th St',           lat: 30.2676, lng: -97.7404, note: 'Intimate craft cocktail bar downtown — one of Austin\'s best kept secrets.' },
];

// ── Map ──────────────────────────────────────────────────────────────
const map = L.map('map', { zoomControl: false }).setView([30.267, -97.743], 13);
L.control.zoom({ position: 'bottomright' }).addTo(map);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap contributors © CARTO',
  maxZoom: 19
}).addTo(map);

function makeIcon(color, selected) {
  const base = selected ? 26 : 20;
  const pinColor = selected ? '#1a1917' : '#c8a96e';
  const svg = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 36" width="${base}" height="${base * 1.5}">
    <path d="M12 0C5.373 0 0 5.373 0 12c0 9 12 24 12 24s12-15 12-24C24 5.373 18.627 0 12 0z" fill="${pinColor}"/>
    <circle cx="12" cy="12" r="4.5" fill="rgba(255,255,255,.9)"/>
  </svg>`;
  return L.divIcon({
    html: svg,
    className: '',
    iconSize: [base, base * 1.5],
    iconAnchor: [base / 2, base * 1.5],
    popupAnchor: [0, -(base * 1.5)]
  });
}

function mapsLink(name, addr) {
  return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name + ' ' + addr + ' Austin TX')}`;
}

// ── Hotel marker ─────────────────────────────────────────────────────
const hotelIcon = L.divIcon({
  html: `<div style="
    background:#1a1917;
    color:#fff;
    border-radius:6px;
    padding:4px 7px;
    font-family:'Inter',sans-serif;
    font-size:11px;
    font-weight:600;
    white-space:nowrap;
    box-shadow:0 2px 8px rgba(0,0,0,.25);
    display:flex;
    align-items:center;
    gap:4px;
  ">🏨 Thompson</div>`,
  className: '',
  iconAnchor: [55, 28],
  popupAnchor: [0, -30],
});

L.marker([HOTEL.lat, HOTEL.lng], { icon: hotelIcon, zIndexOffset: 1000 })
  .addTo(map)
  .bindPopup(`<div class="popup-body">
    <div class="popup-cat">Your Hotel</div>
    <div class="popup-name">${HOTEL.name}</div>
    <div class="popup-addr">${HOTEL.addr}, Austin TX</div>
    <a class="popup-link" href="https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(HOTEL.name + ' Austin TX')}" target="_blank" rel="noopener">Open in Maps →</a>
  </div>`, { maxWidth: 290 });

let activeFilter = 'All';
let selectedIdx = null;
const markers = [];

PLACES.forEach((p, i) => {
  const marker = L.marker([p.lat, p.lng], { icon: makeIcon(CATEGORIES[p.cat].color, false) })
    .addTo(map)
    .bindPopup(() => `<div class="popup-body">
      <div class="popup-cat">${CATEGORIES[p.cat].label}</div>
      <div class="popup-name">${p.name}</div>
      <div class="popup-note">${p.note}</div>
      <div class="popup-addr">${p.addr}, Austin TX</div>
      <a class="popup-link" href="${mapsLink(p.name, p.addr)}" target="_blank" rel="noopener">Open in Maps →</a>
    </div>`, { maxWidth: 290 });
  marker.on('click', () => { selectPlace(i, false); });
  markers.push(marker);
});

// ── Filters ──────────────────────────────────────────────────────────
const filtersEl = document.getElementById('filters');
const listEl = document.getElementById('place-list');
const countEl = document.getElementById('count-label');

function buildFilters() {
  filtersEl.innerHTML = '';
  const all = document.createElement('button');
  all.className = 'chip' + (activeFilter === 'All' ? ' active' : '');
  all.textContent = 'All';
  all.onclick = () => setFilter('All');
  filtersEl.appendChild(all);

  Object.entries(CATEGORIES).forEach(([key, cat]) => {
    const chip = document.createElement('button');
    chip.className = 'chip' + (activeFilter === key ? ' active' : '');
    chip.textContent = cat.label;
    chip.onclick = () => setFilter(activeFilter === key ? 'All' : key);
    filtersEl.appendChild(chip);
  });
}

function setFilter(key) {
  activeFilter = key;
  selectedIdx = null;
  buildFilters();
  buildList();
  updateMarkers();
}

function buildList() {
  listEl.innerHTML = '';
  const visible = PLACES.filter(p => activeFilter === 'All' || p.cat === activeFilter);
  countEl.textContent = activeFilter === 'All'
    ? `${PLACES.length} places to try`
    : `${visible.length} of ${PLACES.length} places`;

  visible.forEach(p => {
    const i = PLACES.indexOf(p);
    const cat = CATEGORIES[p.cat];
    const item = document.createElement('div');
    item.className = 'place-item' + (selectedIdx === i ? ' selected' : '');
    item.dataset.idx = i;
    item.innerHTML = `
      <div>
        <div class="place-name">${p.name}</div>
        <div class="place-note">${p.note}</div>
        <div class="place-meta">${cat.label} &nbsp;·&nbsp; ${p.addr}</div>
        <a class="place-maps" href="${mapsLink(p.name, p.addr)}" target="_blank" rel="noopener" onclick="event.stopPropagation()">Open in Maps →</a>
      </div>`;
    item.onclick = () => selectPlace(i, true);
    listEl.appendChild(item);
  });
}

function selectPlace(i, pan) {
  if (selectedIdx !== null) {
    markers[selectedIdx].setIcon(makeIcon(CATEGORIES[PLACES[selectedIdx].cat].color, false));
  }
  selectedIdx = i;
  markers[i].setIcon(makeIcon(CATEGORIES[PLACES[i].cat].color, true));
  buildList();
  const el = listEl.querySelector(`[data-idx="${i}"]`);
  if (el) el.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
  if (pan) {
    map.setView([PLACES[i].lat, PLACES[i].lng], Math.max(map.getZoom(), 15), { animate: true });
  }
  markers[i].openPopup();
}

function updateMarkers() {
  PLACES.forEach((p, i) => {
    const show = activeFilter === 'All' || p.cat === activeFilter;
    if (show && !map.hasLayer(markers[i])) markers[i].addTo(map);
    if (!show && map.hasLayer(markers[i])) markers[i].remove();
  });
}

// ── Mobile map toggle ─────────────────────────────────────────────────
let mapVisible = false;

function toggleMobileView() {
  mapVisible = !mapVisible;
  const mapWrap = document.getElementById('map-wrap');
  const label = document.getElementById('toggle-label');
  const icon = document.getElementById('toggle-icon');
  mapWrap.classList.toggle('visible', mapVisible);
  label.textContent = mapVisible ? 'List' : 'Map';
  icon.textContent = mapVisible ? '☰' : '🗺';
  if (mapVisible) map.invalidateSize();
}

buildFilters();
buildList();
</script>
</body>
</html>
